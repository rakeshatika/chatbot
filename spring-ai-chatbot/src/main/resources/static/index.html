<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a38;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --accent2: #f76aab;
      --text: #e8e8f0;
      --text-muted: #7a7a9a;
      --user-bg: #1e1c3a;
      --ai-bg: #161620;
      --code-bg: #0d0d16;
      --success: #4ade80;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .model-badge {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Messages ── */
    #messages {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .bubble-wrap {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-wrap.user { margin-left: auto; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .bubble-wrap.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .bubble-wrap.ai .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 0.88rem;
      max-width: calc(100% - 46px);
    }

    .bubble-wrap.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(124,106,247,0.3);
      color: #d4d0ff;
      border-bottom-right-radius: 4px;
    }

    .bubble-wrap.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* ── Code blocks ── */
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
      font-size: 0.82rem;
    }

    .bubble code {
      font-family: 'DM Mono', monospace;
      color: #a5b4fc;
    }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex; gap: 5px; align-items: center;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      margin: auto;
      padding: 40px 20px;
    }

    .welcome .icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto 28px;
    }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124,106,247,0.1);
    }

    /* ── Input area ── */
    footer {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 820px;
      margin: 0 auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:active { transform: scale(0.93); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    #sendBtn svg { width: 16px; height: 16px; fill: white; }

    .hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.7rem;
      margin-top: 10px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">✦</div>
  <h1>NeuralChat</h1>
  <div class="status-dot"></div>
  <div class="model-badge">llama-3.3-70b · Groq</div>
</header>

<!-- ── Messages ── -->
<div id="messages">
  <div class="welcome" id="welcome">
    <span class="icon">⚡</span>
    <h2>What can I help you with?</h2>
    <p>Powered by Llama 3.3 70B via Groq — blazing fast, completely free.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Explain quantum computing</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Write a Python web scraper</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Best practices for REST APIs</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Debug my Java code</button>
    </div>
  </div>
</div>

<!-- ── Input ── -->
<footer>
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Type a message… (Shift+Enter for newline)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">Enter to send · Shift+Enter for new line</p>
</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  let history = [];
  let isLoading = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    sendMessage();
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function addBubble(role, content) {
    removeWelcome();
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatMessage(content);

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addTypingIndicator() {
    removeWelcome();
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ai';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function formatMessage(text) {
    // Simple markdown-like formatting
    return text
      .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .split('\n').map(line => line ? `<p>${line}</p>` : '').join('');
  }

  function scrollToBottom() {
    setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 50);
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addBubble('user', msg);

    // Show typing indicator
    const typingBubble = addTypingIndicator();

    try {
      const response = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history })
      });

      if (!response.ok) throw new Error('Server error: ' + response.status);

      removeTypingIndicator();

      // Streaming response
      const aiBubble = addBubble('ai', '');
      let fullText = '';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        // SSE format: "data: ...\n\n"
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (line.startsWith('data:')) {
            const token = line.slice(5);  // remove "data:"
            fullText += token;
            aiBubble.innerHTML = formatMessage(fullText) || '&nbsp;';
            scrollToBottom();
          }
        }
      }

      // Update history for multi-turn conversation
      history.push({ role: 'user', content: msg });
      history.push({ role: 'assistant', content: fullText });

      // Keep history to last 10 messages to avoid token limits
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      removeTypingIndicator();
      addBubble('ai', `⚠️ Error: ${err.message}. Check your GROQ_API_KEY in application.properties.`);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
